arena:
  name: "camera_test_single_tag"
  frame_id: "map"
  convention:
    units: "meters"
    axes: "ROS REP-103"
    description: "+x forward, +y left, +z up"
    origin: "floor_under_camera"

# Measurements of tag position from the map origin (often the floor under the camera) should be consistent with the assumptions in the tag pose below.
apriltags:
  family: "tag36h11"
  # default_size_m: 0.1651
  default_size_m: 0.1720
  tags:
    - id: 3
      # size_m: 0.1651
      size_m: 0.1720
      pose:
        # Assumptions:
        # - AprilTags are in base_link frame (ROS REP-103) 
        #   with z up, x forward, y left
        # - map origin is on the floor directly below the camera
        # - camera optical center is at z = 1.13 m
        # - tag center is 280 cm in front of camera and at height (z) = 112 cm
        position: { x: 2.80, y: 0.000, z: 1.12 }
        # position: { x: 3.20, y: 0.000, z: 1.12 }
        # position: { x: 0.0, y: 1.13, z: 3.20}
        # yaw = pi so tag front faces back toward camera at the origin
        orientation_rpy: { roll: 0.0, pitch: 0.0, yaw: 3.14159265359 }
      notes: "Single test tag: 320 mm ahead of camera, 0.20 m above camera center, camera 57mm from floor, AprilTag 3 113 mm from floor"